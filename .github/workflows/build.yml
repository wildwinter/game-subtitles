name: Build & Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies (root)
        run: npm install

      - name: Install npm dependencies (render helper)
        run: npm install --prefix render-helpers/render-helper-js

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
